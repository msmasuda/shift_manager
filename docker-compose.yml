version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: shift_manager_db
    restart: always
    environment:
      POSTGRES_USER: shift_manager
      POSTGRES_PASSWORD: shift_manager
      POSTGRES_DB: shift_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
